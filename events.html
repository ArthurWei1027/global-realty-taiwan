<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>活動預告｜環球置業 Global Realty · 澳華國際集團</title>
  <meta name="description" content="環球置業最新說明會、分行拓展與市場活動預告。">
  <link rel="canonical" href="https://www.awardglobal.com.au/events.html">
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/brand.css">
</head>
<body data-page="events">
  <div id="site-header"></div>

  <main>
    <section class="events-upcoming" aria-labelledby="upcoming-heading">
      <div class="container">
        <h2 id="upcoming-heading" class="section-heading text-center">活動預告</h2>
        <p class="section-lead text-center">環球置業定期於台北舉辦澳洲置產說明會與主題品鑑活動，最新場次將於此公布，歡迎預先報名。</p>
        <div class="events-upcoming__grid">
          <article class="events-upcoming__card">
            <p class="events-upcoming__tag">說明會系列</p>
            <h3>澳洲置產說明會 · 台北 101</h3>
            <p>於台北 101 辦公室定期舉辦，解析澳洲樓市趨勢、精選建案與海外買家合規要點，並提供一對一諮詢。</p>
            <a href="index.html#consult" class="btn btn-nord">預約下一場</a>
          </article>
          <article class="events-upcoming__card">
            <p class="events-upcoming__tag">主題活動</p>
            <h3>紅酒置產品鑑會</h3>
            <p>結合澳洲紅酒品鑑與墨爾本置產分享的小型主題聚會，輕鬆氛圍中掌握第一手項目資訊。</p>
            <a href="index.html#consult" class="btn btn-nord">索取活動資訊</a>
          </article>
        </div>
      </div>
    </section>

    <section class="events-gallery" id="gallery" aria-labelledby="gallery-heading">
      <div class="container">
        <h2 id="gallery-heading" class="section-heading text-center">活動展示</h2>
        <p class="section-lead text-center">台北 101 說明會與文華東方品鑑會現場實況，滑鼠移入可暫停瀏覽。</p>
      </div>
      <div class="events-gallery__marquee" aria-label="活動照片輪播">
        <div class="events-gallery__track">
          <img src="assets/images/gallery/event-101-1.jpg" alt="台北 101 澳洲置產說明會現場" loading="lazy">
          <img src="assets/images/gallery/event-101-2.jpg" alt="台北 101 說明會來賓交流" loading="lazy">
          <img src="assets/images/gallery/event-101-3.jpg" alt="台北 101 說明會顧問分享" loading="lazy">
          <img src="assets/images/gallery/event-101-4.jpg" alt="台北 101 說明會活動剪影" loading="lazy">
          <img src="assets/images/gallery/event-mo-1.jpg" alt="文華東方品鑑會現場" loading="lazy">
          <img src="assets/images/gallery/event-mo-2.jpg" alt="文華東方品鑑會來賓交流" loading="lazy">
          <img src="assets/images/gallery/event-101-5.jpg" alt="台北 101 說明會活動花絮" loading="lazy">
          <img src="assets/images/gallery/event-101-8.jpg" alt="台北 101 說明會合影" loading="lazy">
          <img src="assets/images/gallery/event-mo-3.jpg" alt="文華東方品鑑會分享環節" loading="lazy">
          <img src="assets/images/gallery/event-mo-4.jpg" alt="文華東方品鑑會活動剪影" loading="lazy">
        </div>
      </div>
    </section>

    <section class="section--compact" style="padding-top:var(--space-12);">
      <div class="container">
        <h2 class="section-heading text-center">過往活動與最新消息</h2>
      </div>
    </section>

    <div class="events-layout">
      <aside class="events-sidebar" aria-label="活動篩選">
        <h2>我們的活動</h2>
        <label class="sr-only" for="event-search">活動搜尋</label>
        <input type="search" id="event-search" placeholder="活動搜尋...">
        <nav class="news-sidebar__filters" aria-label="消息篩選">
          <a href="#" class="news-sidebar__filter is-active" data-category="">全部消息</a>
          <a href="#" class="news-sidebar__filter" data-category="event">最新活動</a>
          <a href="#" class="news-sidebar__filter" data-category="news">新聞動態</a>
          <a href="#" class="news-sidebar__filter" data-category="csr">社會責任</a>
        </nav>
      </aside>
      <div class="events-main">
        <div class="events-grid news-list" aria-live="polite" aria-label="活動列表"></div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>
  <script src="js/brand.js"></script>
  <script src="js/main.js"></script>
  <script src="js/forms.js"></script>
  <script src="js/news.js"></script>
  <script>
    // 活動展示無縫輪播：複製一輪圖片以銜接動畫
    document.addEventListener('DOMContentLoaded', () => {
      const track = document.querySelector('.events-gallery__track');
      if (!track) return;
      track.innerHTML += track.innerHTML;
    });
  </script>
</body>
</html>
