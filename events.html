<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>活動預告｜環球置業 Global Realty · 澳華國際集團</title>
  <meta name="description" content="環球置業最新說明會、分行拓展與市場活動預告。">
  <link rel="canonical" href="https://www.awardglobal.com.au/events.html">
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/layout.css?v=20260709b">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/brand.css?v=20260709f">
</head>
<body data-page="events">
  <div id="site-header"></div>

  <main>
    <section class="events-upcoming" aria-labelledby="upcoming-heading">
      <div class="events-upcoming__layout">
        <aside class="events-upcoming__sidebar" aria-label="活動篩選">
          <h2 id="upcoming-heading">活動預告</h2>
          <label class="sr-only" for="events-upcoming-search">活動搜尋</label>
          <input type="search" id="events-upcoming-search" placeholder="活動搜尋...">
          <nav class="events-upcoming__filters" aria-label="活動類別">
            <a href="#" class="events-upcoming__filter is-active" data-event-category="">全部活動</a>
            <a href="#" class="events-upcoming__filter" data-event-category="seminar">說明會系列</a>
            <a href="#" class="events-upcoming__filter" data-event-category="themed">主題活動</a>
          </nav>
          <label class="events-upcoming__month-label" for="events-upcoming-month">月份</label>
          <select id="events-upcoming-month" class="events-upcoming__month">
            <option value="">全部月份</option>
          </select>
          <p class="events-upcoming__note">環球置業定期於台北舉辦澳洲置產說明會與主題品鑑活動，最新場次將於此公布，歡迎預先報名。</p>
        </aside>
        <div class="events-upcoming__main">
          <div class="events-upcoming__toolbar">
            <div class="events-upcoming__tabs" role="tablist" aria-label="活動狀態">
              <button type="button" class="events-upcoming__tab is-active" role="tab" data-event-status="upcoming" aria-selected="true">即將舉行</button>
              <button type="button" class="events-upcoming__tab" role="tab" data-event-status="past" aria-selected="false">已結束</button>
            </div>
            <p class="events-upcoming__count" data-events-count aria-live="polite"></p>
          </div>
          <div class="event-feed" data-events-feed aria-live="polite" aria-label="活動列表"></div>
          <button type="button" class="btn btn-secondary events-upcoming__load-more" data-events-load-more hidden>載入更多</button>
        </div>
      </div>
    </section>

    <section class="events-gallery" id="gallery" aria-labelledby="gallery-heading">
      <div class="container">
        <h2 id="gallery-heading" class="section-heading text-center">活動展示</h2>
        <p class="section-lead text-center">環球置業說明會與品鑑會現場實況，滑鼠移入可暫停瀏覽。</p>
      </div>
      <div class="events-gallery__marquee" aria-label="活動照片輪播">
        <div class="events-gallery__track">
          <img src="assets/images/gallery/event-still-01.jpg" alt="活動現場紅酒品鑑布置" loading="lazy">
          <img src="assets/images/gallery/event-still-02.jpg" alt="說明會主講分享環節" loading="lazy">
          <img src="assets/images/gallery/event-still-03.jpg" alt="來賓瀏覽 AURA 建案資料" loading="lazy">
          <img src="assets/images/gallery/event-still-04.jpg" alt="活動報到與幸運抽獎" loading="lazy">
          <img src="assets/images/gallery/event-still-05.jpg" alt="置業顧問一對一諮詢" loading="lazy">
          <img src="assets/images/gallery/event-still-06.jpg" alt="澳華國際集團主題分享" loading="lazy">
          <img src="assets/images/gallery/event-still-07.jpg" alt="品鑑會來賓交流" loading="lazy">
          <img src="assets/images/gallery/event-still-08.jpg" alt="說明會現場交流" loading="lazy">
        </div>
      </div>
    </section>

    <section class="section--compact" style="padding-top:var(--space-12);">
      <div class="container">
        <h2 class="section-heading text-center">過往活動與最新消息</h2>
      </div>
    </section>

    <div class="events-layout">
      <aside class="events-sidebar" aria-label="活動篩選">
        <h2>我們的活動</h2>
        <label class="sr-only" for="event-search">活動搜尋</label>
        <input type="search" id="event-search" placeholder="活動搜尋...">
        <nav class="news-sidebar__filters" aria-label="消息篩選">
          <a href="#" class="news-sidebar__filter is-active" data-category="">全部消息</a>
          <a href="#" class="news-sidebar__filter" data-category="event">最新活動</a>
        </nav>
      </aside>
      <div class="events-main">
        <div class="events-grid news-list" aria-live="polite" aria-label="活動列表"></div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>
  <script src="js/brand.js"></script>
  <script src="js/seo-config.js"></script>
  <script src="js/seo.js"></script>
  <script src="js/main.js?v=20260709b"></script>
  <script src="js/forms.js"></script>
  <script>window.GR_EVENTS_VERSION = '20260723g';</script>
  <script src="js/events-data.js?v=20260723g"></script>
  <script src="js/events.js?v=20260723g"></script>
  <script src="js/news.js"></script>
  <script>
    // 活動展示無縫輪播：複製一輪圖片以銜接動畫
    document.addEventListener('DOMContentLoaded', () => {
      const track = document.querySelector('.events-gallery__track');
      if (!track) return;
      track.innerHTML += track.innerHTML;
    });
  </script>
</body>
</html>
